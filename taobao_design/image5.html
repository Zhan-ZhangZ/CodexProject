<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>淘宝主图5 - 购买须知</title>
    <style>
        :root {
            --brand-blue: #0960eb;
            --brand-orange: #f8a825;
            --light-orange: #fffbf2;
            --text-dark: #1f2937;
            --text-muted: #4b5563;
        }
        body {
            margin: 0;
            padding: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at top left, #ffffff, #e1edff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(9, 96, 235, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(9, 96, 235, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
        }
        .header-title {
            font-size: 50px;
            font-weight: 900;
            color: var(--text-dark);
            text-align: center;
            margin: 10px 0 0 0;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
        .header-title span {
            color: var(--brand-orange);
            font-size: 52px;
        }
        .notice-container {
            width: 100%;
            background: #ffffff;
            border: 2px solid rgba(248, 168, 37, 0.15);
            border-radius: 28px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.04);
            z-index: 1;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .notice-card {
            background-color: var(--light-orange);
            border: 1px solid rgba(248, 168, 37, 0.15);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        .notice-icon {
            width: 44px;
            height: 44px;
            background-color: var(--brand-orange);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .notice-content {
            display: flex;
            flex-direction: column;
        }
        .notice-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .notice-desc {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.5;
        }
        .footer-banner {
            background-color: rgba(9, 96, 235, 0.05);
            border: 1px dashed var(--brand-blue);
            color: var(--brand-blue);
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 16px;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <h2 class="header-title"><span>⚠️</span> 购买须知与服务边界</h2>

    <div class="notice-container">
        <div class="notice-card">
            <div class="notice-icon">1</div>
            <div class="notice-content">
                <div class="notice-title">虚拟商品 · 下单自动发货</div>
                <div class="notice-desc">本商品为虚拟服务软件整合包，属非实体物品。下单付款后系统将自动发送百度网盘或直链下载地址。</div>
            </div>
        </div>
        <div class="notice-card">
            <div class="notice-icon">2</div>
            <div class="notice-content">
                <div class="notice-title">非实体物品 · 不支持无理由退款</div>
                <div class="notice-desc">由于虚拟商品的可复制性特殊，一经售出发货，不支持无理由退货、退款换货，请在拍下前知悉。</div>
            </div>
        </div>
        <div class="notice-card">
            <div class="notice-icon">3</div>
            <div class="notice-content">
                <div class="notice-title">效果免责声明</div>
                <div class="notice-desc">使用效果因人各异，受您本地的 Codex 版本、大模型 API 响应等多种环境因素影响，本店不对您后续的使用效果负责。</div>
            </div>
        </div>
    </div>

    <div class="footer-banner">💡 下单下载后解压，即可直接复制导入智能体环境使用</div>
</body>
</html>
