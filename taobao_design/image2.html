<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>淘宝主图2 - 痛点解决</title>
    <style>
        :root {
            --brand-blue: #0960eb;
            --brand-red: #ea4335;
            --light-blue: #f0f6ff;
            --light-red: #fdf2f2;
            --text-dark: #1f2937;
            --text-muted: #4b5563;
        }
        body {
            margin: 0;
            padding: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at top left, #ffffff, #e1edff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(9, 96, 235, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(9, 96, 235, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
        }
        .header-title {
            font-size: 52px;
            font-weight: 900;
            color: var(--text-dark);
            text-align: center;
            margin: 10px 0 0 0;
            z-index: 1;
            line-height: 1.3;
        }
        .header-title span {
            color: var(--brand-red);
        }
        .comparison-container {
            display: flex;
            gap: 24px;
            width: 100%;
            z-index: 1;
            margin: 10px 0;
        }
        .panel {
            flex: 1;
            border-radius: 28px;
            padding: 40px 28px;
            box-sizing: border-box;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            border: 2px solid;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel-red {
            background-color: var(--light-red);
            border-color: rgba(234, 67, 53, 0.15);
        }
        .panel-blue {
            background-color: #ffffff;
            border-color: rgba(9, 96, 235, 0.2);
            box-shadow: 0 16px 40px rgba(9, 96, 235, 0.08);
        }
        .panel-header {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 28px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .panel-red .panel-header {
            color: var(--brand-red);
        }
        .panel-blue .panel-header {
            color: var(--brand-blue);
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .list-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 20px;
            line-height: 1.5;
        }
        .bullet-icon {
            font-size: 22px;
            font-weight: 900;
            margin-top: 2px;
        }
        .panel-red .bullet-icon {
            color: var(--brand-red);
        }
        .panel-blue .bullet-icon {
            color: var(--brand-blue);
        }
        .solution-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-dark);
        }
        .solution-desc {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .footer-highlight {
            width: 100%;
            background: linear-gradient(90deg, var(--brand-blue), #0033aa);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: 800;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(9, 96, 235, 0.25);
            z-index: 1;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <h2 class="header-title">寻找行业技能眼花缭乱？<br><span>不知道去哪里寻找？</span></h2>

    <div class="comparison-container">
        <!-- Left Pain Points -->
        <div class="panel panel-red">
            <div class="panel-header">
                <span>⚠️</span> 常见安装与寻找难点
            </div>
            <div class="item-list">
                <div class="list-item">
                    <span class="bullet-icon">✗</span>
                    <div>
                        <div class="solution-title">行业技能分散</div>
                        <div class="solution-desc">海量开源仓库，寻找繁琐，版本冲突</div>
                    </div>
                </div>
                <div class="list-item">
                    <span class="bullet-icon">✗</span>
                    <div>
                        <div class="solution-title">手工配置太累</div>
                        <div class="solution-desc">逐一编写 SKILL.md，调试极易报错</div>
                    </div>
                </div>
                <div class="list-item">
                    <span class="bullet-icon">✗</span>
                    <div>
                        <div class="solution-title">智能体不聪明</div>
                        <div class="solution-desc">没有合适的技能，大模型无法落地使用</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Solution -->
        <div class="panel panel-blue">
            <div class="panel-header">
                <span>✅</span> 我们的开箱即用解决方案
            </div>
            <div class="item-list">
                <div class="list-item">
                    <span class="bullet-icon">✓</span>
                    <div>
                        <div class="solution-title">一键解压即用</div>
                        <div class="solution-desc">54个分类文件夹，彻底告别零散查找</div>
                    </div>
                </div>
                <div class="list-item">
                    <span class="bullet-icon">✓</span>
                    <div>
                        <div class="solution-title">内置自动索引</div>
                        <div class="solution-desc">发送指令给 Codex，由 AI 自动挑选运行</div>
                    </div>
                </div>
                <div class="list-item">
                    <span class="bullet-icon">✓</span>
                    <div>
                        <div class="solution-title">让 Codex 更强悍</div>
                        <div class="solution-desc">海量外挂技能，大模型秒变开发专家</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-highlight">🚀 技多不压身 · 让你的 Codex 更聪明能干</div>
</body>
</html>
