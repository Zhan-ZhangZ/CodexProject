<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>淘宝主图1 - 封面</title>
    <style>
        :root {
            --brand-blue: #0960eb;
            --light-blue: #f0f6ff;
            --text-dark: #1f2937;
            --text-muted: #4b5563;
        }
        body {
            margin: 0;
            padding: 0;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at top left, #ffffff, #e1edff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 24px 16px;
            position: relative;
            overflow: hidden;
        }
        /* Grid background effect */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(9, 96, 235, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(9, 96, 235, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 0;
        }
        .header-badge {
            background-color: var(--brand-blue);
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            padding: 12px 36px;
            border-radius: 100px;
            letter-spacing: 2px;
            z-index: 1;
            box-shadow: 0 4px 12px rgba(9, 96, 235, 0.2);
            margin-top: 10px;
        }
        .main-title-container {
            text-align: center;
            z-index: 1;
            margin-top: 10px;
        }
        .main-title {
            font-size: 80px;
            font-weight: 900;
            color: var(--brand-blue);
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 2px 10px rgba(9, 96, 235, 0.1);
        }
        .sub-title {
            font-size: 40px;
            font-weight: 800;
            margin: 10px 0 0 0;
            letter-spacing: 4px;
            color: var(--text-dark);
        }
        .logo-container {
            width: 220px;
            height: 220px;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 16px 40px rgba(9, 96, 235, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            border: 2px solid rgba(255,255,255,0.8);
            margin: 10px 0;
        }
        .codex-logo {
            width: 150px;
            height: 150px;
            background-color: #ffffff;
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }
        /* Custom Cloud Shape in Blue */
        .codex-logo::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 68px;
            background: linear-gradient(135deg, #0960eb, #0044cc);
            border-radius: 34px;
            top: 41px;
            left: 25px;
            box-shadow: 0 4px 10px rgba(9, 96, 235, 0.2);
        }
        .codex-logo::after {
            content: '>_';
            position: absolute;
            color: #ffffff;
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
            font-size: 36px;
            font-weight: 800;
            top: 55px;
            left: 44px;
            letter-spacing: -2px;
        }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            width: 100%;
            z-index: 1;
        }
        .feature-card {
            background: #ffffff;
            border: 1px solid rgba(9, 96, 235, 0.08);
            border-radius: 20px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
        }
        .feature-icon {
            width: 44px;
            height: 44px;
            background-color: var(--light-blue);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand-blue);
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .feature-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
            word-break: break-word;
        }
        .feature-main {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            white-space: nowrap;
            letter-spacing: -0.5px;
        }
        .feature-sub {
            font-size: 15px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .footer-banner {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-blue);
            opacity: 0.8;
            letter-spacing: 2px;
            z-index: 1;
            border-top: 1px solid rgba(9, 96, 235, 0.1);
            width: 100%;
            text-align: center;
            padding-top: 16px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    
    <div class="main-title-container">
        <h1 class="main-title">Codex Skills</h1>
        <div class="sub-title">你的智能体专用技能仓库</div>
    </div>

    <div class="logo-container">
        <div class="codex-logo"></div>
    </div>

    <div class="features-grid">
        <div class="feature-card">
            <div class="feature-icon">✓</div>
            <div class="feature-text">
                <span class="feature-main">800+Skill&MCP&API合集</span>
                <span class="feature-sub">覆盖海量行业应用场景、持续增加数量与优化中</span>
            </div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">⚡</div>
            <div class="feature-text">
                <span class="feature-main">直接可用</span>
                <span class="feature-sub">无感加载，解压即连</span>
            </div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">📦</div>
            <div class="feature-text">
                <span class="feature-main">50+ 行业分类</span>
                <span class="feature-sub">多维索引，极速匹配</span>
            </div>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🛡️</div>
            <div class="feature-text">
                <span class="feature-main">Agent 智能体适配</span>
                <span class="feature-sub">一库多智能体通用：Codex、ZCodex、WorkBuddy 等</span>
            </div>
        </div>
    </div>

    <div class="footer-banner">— 让您的智能体更聪明、更能干 —</div>
</body>
</html>
