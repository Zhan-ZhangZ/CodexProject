# Smithery MCP server manifest — https://smithery.ai
# BuyWhere: Agent-native product catalog API for Southeast Asia commerce

name: buywhere
displayName: BuyWhere MCP Server
description: >
  Agent-native product catalog API. Search products across Shopee, Lazada, Amazon SG,
  Amazon US, Walmart, Carousell, FairPrice, Harvey Norman, and 20+ e-commerce platforms.
  Compare prices across merchants, browse categories, and get affiliate links — all through
  a single MCP endpoint.

  📚 Read our engineering blog at https://buywhere.ai/blog for MCP server guides,
  ecommerce deep-dives, and agent-native commerce learnings.

version: 1.0.0
license: MIT

mcp:
  transport: stdio
  authentication:
    type: bearer
    description: >
      API key required. Get a free key at https://buywhere.ai/dashboard.
      Free tier: 1,000 calls/month. No credit card required.

tools:
  - name: search_products
    description: >
      Search the BuyWhere product catalog using keywords or natural language.
      Returns matching products with title, price, availability, merchant, and URL.

  - name: get_product
    description: >
      Fetch full details for a single product by its BuyWhere product ID.

  - name: get_price
    description: >
      Get current prices for a product across all available merchants.
      Returns a ranked list of listings with price, shipping, merchant rating, and stock status.

  - name: compare_prices
    description: >
      Compare 2–5 products side-by-side. Returns structured differentiators,
      price range, pros/cons, and a best-value recommendation.

  - name: get_affiliate_link
    description: >
      Get the click-tracked BuyWhere affiliate link for a product.
      Share this with users — it logs the referral and redirects to the merchant page.

  - name: get_catalog
    description: >
      List available product categories in the BuyWhere catalog.
      Use this to discover what categories exist before searching or filtering.

categories:
  - Commerce
  - Shopping
  - Price Comparison
  - Singapore
  - Southeast Asia

keywords:
  - shopping
  - ecommerce
  - price comparison
  - product search
  - singapore
  - southeast asia
  - shopee
  - lazada
  - amazon
  - ai agent
  - mcp
  - commerce api

author:
  name: BuyWhere
  email: api@buywhere.ai
  url: https://buywhere.ai

homepage: https://buywhere.ai
documentation: https://api.buywhere.ai/docs/guides/mcp
repository: https://github.com/BuyWhere/buywhere-mcp

startCommand:
  type: node
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: BuyWhere API Key
        description: Your BuyWhere API key. Get one free at https://buywhere.ai/dashboard
        x-sensitive: true
    required: [apiKey]
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "@buywhere/mcp-server"],
      env: config.apiKey ? { BUYWHERE_API_KEY: config.apiKey } : {}
    })

supported_clients:
  - Claude Desktop
  - Cursor
  - VS Code Copilot
  - Custom MCP agents
  - LangChain
  - CrewAI
  - AutoGen
  - Gemini

regions:
  - Singapore (SG)
  - United States (US)
  - Vietnam (VN)
  - Thailand (TH)
  - Malaysia (MY)

features:
  - Real-time product search across 1.5M+ products
  - Cross-merchant price comparison
  - Discount/deal discovery
  - Category browsing
  - Multi-currency support (SGD, USD, MYR, IDR, THB, PHP, VND)
  - Region-filtered search
  - Compact JSON mode for AI agents
  - Free tier available (1,000 calls/month)
