[project]
name = "opcua-local-server"
version = "0.1.2"
description = "Mock industrial OPC UA server (simulated PLC/sensors) for local development and tests."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "opcua>=0.98.13",
]

[project.scripts]
opcua-mock-server = "opcua_local_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["opcua_local_server.py"]
