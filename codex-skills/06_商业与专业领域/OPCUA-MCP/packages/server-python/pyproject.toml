[project]
name = "opcua-mcp-server"
version = "0.1.2"
description = "MCP server exposing OPC UA read/write/browse/method/history tools (FastMCP + python-opcua)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=45.0.2",
    "httpx>=0.28.1",
    "mcp[cli]>=1.9.1",
    "opcua>=0.98.13",
]

[project.scripts]
opcua-mcp-server = "opcua_mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["opcua_mcp_server.py"]

# Bundle the shared tool contract next to the module so a pip/uvx-installed wheel
# is self-contained (the canonical source lives at the repo root /contract). The
# namespaced filename avoids colliding with other distributions at the install root.
[tool.hatch.build.targets.wheel.force-include]
"../../contract/tools.json" = "opcua_mcp_server_contract.json"
