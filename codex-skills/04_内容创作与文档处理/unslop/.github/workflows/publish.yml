name: Publish to PyPI

on:
  push:
    tags: ["unslop-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. unslop-v0.4.0)"
        required: true

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build + publish unslop to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/unslop/
    # Trusted Publishing to PyPI: https://docs.pypi.org/trusted-publishers/
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify package version matches tag
        working-directory: unslop
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          VERSION=$(python -c "from scripts import __version__; print(__version__)")
          TAG="${GITHUB_REF_NAME:-$DISPATCH_TAG}"
          EXPECTED="unslop-v${VERSION}"
          echo "Tag: ${TAG}"
          echo "Expected: ${EXPECTED}"
          if [ "${TAG}" != "${EXPECTED}" ]; then
            echo "Tag/version mismatch. Bump scripts/__init__.py or retag."
            exit 1
          fi

      - name: Build sdist + wheel
        working-directory: unslop
        run: python -m build

      - name: Validate built artifacts
        working-directory: unslop
        run: twine check dist/*

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: unslop/dist/
